<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AliCDN图床</title>
    <style>
        :root { --border:#e5e5e5; --text:#222; --muted:#666; --bg:#f6f6f6; --primary:#0d6efd; }
        * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.35; }
        .wrap { max-width: 720px; margin: 40px auto; padding: 0 16px; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        h1 { font-size: 20px; margin: 0 0 8px; font-weight: 600; }
        p.note { margin: 0 0 16px; color: var(--muted); font-size: 14px; }
        .row { display: grid; grid-template-columns: 1fr; gap: 12px; }
        label { font-size: 14px; color: var(--muted); }
    /* 仅让主要操作按钮(.btn)和表单控件占满宽度，普通按钮（如复制）保持自适应 */
    input[type="file"], input[type="text"], select, .btn { width: 100%; padding: 14px 16px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }
        select { background-color: #fff; }
        .btn { background: var(--primary); color: #fff; border-color: var(--primary); cursor: pointer; }
        .btn:disabled { opacity: .6; cursor: not-allowed; }
        .bar { height: 6px; background: #f0f0f0; border-radius: 4px; overflow: hidden; display:none; }
        .bar>i { display:block; height:100%; width:0%; background: var(--primary); transition: width .2s; }
        .status { margin: 8px 0 0; font-size: 13px; color: var(--muted); }
        .files-tip { font-size: 13px; color: var(--muted); }
        .top { display:flex; align-items:center; justify-content: space-between; margin-bottom:12px; }
        .top a { color: var(--primary); text-decoration: none; font-size: 13px; }
        .results { margin-top: 16px; }
    .item { border:1px solid var(--border); border-radius:6px; padding:10px; display:flex; gap:8px; align-items: center; margin-top:10px; }
        .thumb { width:56px; height:56px; object-fit: cover; border:1px solid var(--border); border-radius:4px; }
        .meta { flex:1; min-width: 0; }
    .meta .name { font-size: 14px; color:#000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
    .meta .url { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; color:#000; word-break: break-all; margin-top:7px; line-height: 1.2; }
    .copy { padding:6px 10px; font-size:12px; border:1px solid var(--primary); border-radius:6px; background:var(--primary); color:#fff; cursor:pointer; width:auto; }
        /* 缩小上传结果里的复制按钮，避免挤压链接导致错位 */
    .results .item { align-items: flex-start; }
    .results .item .copy { padding: 4px 6px; font-size: 11px; border-radius: 4px; align-self: flex-start; flex-shrink: 0; width: auto; }
    .results .item .meta .url { word-break: break-all; overflow-wrap: anywhere; }
        .err { color:#c0392b; font-size:13px; }
    .muted { color: var(--muted); font-size: 12px; }
    /* 放大“保留上传列表”的复选框，并使用主题色 */
    #keepList { transform: scale(1.4); transform-origin: left center; accent-color: var(--primary); }
    .danger { border-color:#e74c3c; color:#e74c3c; }
    .copy.danger { background:#fff; color:#e74c3c; border-color:#e74c3c; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
                        <div class="top">
                                <h1>AliCDN图床</h1>
                                <div style="display:flex; gap:8px; align-items:center;">
                                    <button id="btnSetCookie" class="copy" title="更新 cookie2（每周过期可在此更换）">更换 Cookie</button>
                                    <a href="gallery.html" class="copy" style="background: var(--primary); color:#fff; border-color: var(--primary); text-decoration:none; white-space: nowrap;">查看画廊</a>
                                </div>
                        </div>
            <p class="note">选择图片，设置分类与格式，点击上传即可获取外链。</p>

            <div class="row">
                <div>
                    <label for="files">图片文件（可多选）</label>
                    <input id="files" name="files[]" type="file" accept="image/*" multiple />
                    <div id="fileTip" class="files-tip">未选择文件</div>
                </div>

                <div>
                    <label for="categorySelect">分类</label>
                    <select id="categorySelect">
                        <option value="未分类">未分类</option>
                    </select>
                    <input id="categoryCustom" type="text" placeholder="输入自定义分类" style="display:none; margin-top:8px;" />
                    <div class="muted" id="catLoadHint">选择一个分类，或在下拉中选择“自定义…”后输入新分类</div>
                </div>

                <div>
                    <label for="format">格式</label>
                    <select id="format">
                        <option value="original">原图</option>
                        <option value="webp">WebP</option>
                        <option value="avif">AVIF</option>
                    </select>
                </div>

                <div>
                    <button id="btnUpload" class="btn">上传</button>
                    <label style="display:flex; align-items:center; gap:4px; margin-top:12px; font-size:8px; color: var(--muted);">
                        <input type="checkbox" id="keepList" /> 保留上传列表
                    </label>
                    <div class="bar" id="bar"><i id="barInner"></i></div>
                    <div class="status" id="status"></div>
                </div>
            </div>

            <div class="results" id="results"></div>
            <p class="muted">提示：支持 JPG/PNG/GIF/WebP，单文件不超过 50MB。</p>
        </div>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        const filesInput = el('files');
    const categorySelect = el('categorySelect');
    const categoryCustom = el('categoryCustom');
        const formatSel = el('format');
        const btn = el('btnUpload');
        const bar = el('bar');
        const barInner = el('barInner');
        const status = el('status');
        const results = el('results');
        const fileTip = el('fileTip');
    const btnSetCookie = el('btnSetCookie');
        const catLoadHint = el('catLoadHint');
        const keepList = el('keepList');
        let lastFiles = [];

        filesInput.addEventListener('change', () => {
            const count = filesInput.files?.length || 0;
            fileTip.textContent = count ? `已选择 ${count} 个文件` : '未选择文件';
        });

    // 初始化分类候选与行为
    loadCategories();
    categorySelect.addEventListener('change', () => {
        if (categorySelect.value === '__custom__') {
            categoryCustom.style.display = 'block';
            setTimeout(() => categoryCustom.focus(), 0);
        } else {
            categoryCustom.style.display = 'none';
            categoryCustom.value = '';
        }
    });

    // 首页不再提供“新增分类”入口，避免误操作

    btnSetCookie.addEventListener('click', async () => {
            const v = prompt('输入新的 cookie2 值：');
            if (v == null) return; // 取消
            const cookie2 = (v || '').trim();
            if (!cookie2) { alert('cookie2 不能为空'); return; }
            try {
                const res = await fetch('set_cookie.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cookie2 })
                });
                const text = await res.text();
                let data = null;
                try { data = JSON.parse(text); } catch (_) { throw new Error('响应解析失败'); }
                if (!res.ok) throw new Error(data && data.message ? data.message : '更新失败');
                if (!data.success) throw new Error(data.message || '更新失败');
                alert('Cookie 已更新');
            } catch (e) {
                alert(e.message || '更新失败');
            }
        });

        btn.addEventListener('click', async () => {
            const files = filesInput.files;
            if (!files || !files.length) {
                alert('请先选择图片');
                return;
            }

            // UI 状态
            setBusy(true);
            resetProgress();
            status.textContent = '上传中…';
            if (!keepList.checked) {
                results.innerHTML = '';
            } else {
                // 新批次分隔
                const sep = document.createElement('div');
                sep.className = 'muted';
                sep.style.marginTop = '10px';
                sep.textContent = '—— 新一批 ——';
                results.appendChild(sep);
            }

            try {
                const fd = new FormData();
                lastFiles = Array.from(files);
                for (const f of lastFiles) fd.append('files[]', f);
                fd.append('category', getSelectedCategory());
                fd.append('format', formatSel.value || 'original');

                // 采用一次性上传，进度用简单阶段百分比（开始→完成）
                showProgress(30);
                const res = await fetch('upload.php', { method: 'POST', body: fd });
                showProgress(70);
                const data = await res.json().catch(() => null);
                if (!data) throw new Error('响应解析失败');

                renderResponse(data, lastFiles);
                // 上传完成后刷新分类候选（后端会在成功时写入新分类）
                loadCategories();
                status.textContent = '完成';
                showProgress(100);
            } catch (e) {
                status.textContent = '上传失败';
                const msg = (e && e.message) ? e.message : '未知错误';
                results.innerHTML = `<div class="item"><div class="meta err">${escapeHtml(msg)}</div></div>`;
            } finally {
                setBusy(false);
                setTimeout(resetProgress, 500);
            }
        });

        function renderResponse(data, batchFiles) {
            // 单文件
            if (typeof data.success === 'boolean' && (data.data || !data.success)) {
                if (data.success) {
                    renderOne({ success:true, data: data.data }, 0, batchFiles);
                } else {
                    renderOne({ success:false, message: data.message || '上传失败' }, 0, batchFiles);
                }
                return;
            }
            // 多文件
            if (Array.isArray(data.results)) {
                data.results.forEach((r, i) => renderOne(r, i, batchFiles));
                return;
            }
            // 未知格式
            results.innerHTML = `<div class="item"><div class="meta err">返回数据格式不符合预期</div></div>`;
        }

        function getSelectedCategory(){
            const sel = categorySelect.value;
            if (sel === '__custom__') {
                const v = (categoryCustom.value || '').trim();
                return v || '未分类';
            }
            return sel || '未分类';
        }

        async function loadCategories(){
            try {
                const res = await fetch('categories.php?action=list', { cache: 'no-store' });
                const text = await res.text();
                console.debug('[categories] status', res.status);
                let data = null;
                try { data = JSON.parse(text); } catch (e) { console.error('[categories] JSON parse error', e, text); throw new Error('响应解析失败'); }
                console.debug('[categories] payload', data);
                const cats = (data && data.success && Array.isArray(data.data)) ? data.data : ['未分类'];
                // 填充下拉：未分类置顶，其他按原顺序；并提供“自定义…”选项
                const prev = getSelectedCategory();
                while (categorySelect.firstChild) categorySelect.removeChild(categorySelect.firstChild);
                const ordered = ['未分类', ...cats.filter(c => String(c) !== '未分类')];
                const seen = new Set();
                for (const c of ordered) {
                    const s = String(c);
                    if (seen.has(s)) continue;
                    seen.add(s);
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s;
                    categorySelect.appendChild(opt);
                }
                const customOpt = document.createElement('option');
                customOpt.value = '__custom__';
                customOpt.textContent = '自定义…';
                categorySelect.appendChild(customOpt);

                // 恢复原选择
                const target = (prev && prev !== '未分类') ? prev : '未分类';
                const hasTarget = Array.from(categorySelect.options).some(o => o.value === target);
                categorySelect.value = hasTarget ? target : '未分类';
                categoryCustom.style.display = (categorySelect.value === '__custom__') ? 'block' : 'none';
                if (catLoadHint) catLoadHint.textContent = '';
            } catch (e) {
                console.error('[categories] fetch failed', e);
                while (categorySelect.firstChild) categorySelect.removeChild(categorySelect.firstChild);
                const def = document.createElement('option'); def.value = '未分类'; def.textContent = '未分类'; categorySelect.appendChild(def);
                const customOpt = document.createElement('option'); customOpt.value = '__custom__'; customOpt.textContent = '自定义…'; categorySelect.appendChild(customOpt);
                categorySelect.value = '未分类';
                categoryCustom.style.display = 'none';
                if (catLoadHint) catLoadHint.textContent = '分类加载失败：' + (e && e.message ? e.message : '未知错误');
            }
        }

        function renderOne(r, index, batchFiles){
            const node = buildItemNode(r, index, batchFiles);
            results.appendChild(node);
        }

        function buildItemNode(r, index, batchFiles){
            if (r && r.success) {
                const d = r.data || {};
                const url = d.url || '';
                const name = d.fileName || '图片';
                const size = d.size || '';
                const node = document.createElement('div');
                node.className = 'item';
                node.innerHTML = `
                    <img class="thumb" src="${escapeAttr(url)}" alt="thumb" onerror="this.style.display='none'" />
                    <div class="meta">
                        <div class="name">${escapeHtml(name)} ${size ? `· ${escapeHtml(size)}` : ''}</div>
                        <div class="url">${escapeHtml(url)}</div>
                    </div>
                    <button class="copy" data-url="${escapeAttr(url)}">复制</button>
                `;
                node.querySelector('.copy').addEventListener('click', () => copy(node.querySelector('.copy').dataset.url));
                return node;
            } else {
                const msg = (r && r.message) ? r.message : '上传失败';
                const fname = (r && r.fileName) ? `（${escapeHtml(r.fileName)}）` : '';
                const node = document.createElement('div');
                node.className = 'item';
                const canRetry = isRetryable(msg);
                node.innerHTML = `
                    <div class="meta err">${escapeHtml(msg)}${fname}</div>
                    ${canRetry ? '<button class="copy danger">重试</button>' : ''}
                `;
                if (canRetry) {
                    const btnRetry = node.querySelector('.danger');
                    // 从本批次中取对应文件，避免后续批次覆盖 lastFiles 导致索引错位
                    const file = Array.isArray(batchFiles) ? batchFiles[index] : (Array.isArray(lastFiles) ? lastFiles[index] : undefined);
                    btnRetry.addEventListener('click', () => retryOne(file, node));
                }
                return node;
            }
        }

        // 判断是否具备重试价值：网络/超时/服务端异常可重试；格式问题等不可重试
        function isRetryable(message){
            const msg = String(message || '').toLowerCase();
            // 明确不可重试的关键词
            const nonRetry = [
                '格式', // 中文“格式”
                'invalid type',
                'unsupported type',
                'file type',
                'mimetype',
                '类型', // 中文“类型”
                'size', '文件大小', 'too large', '超过',
            ];
            if (nonRetry.some(k => msg.includes(k))) return false;
            // 典型可重试关键词
            const retryable = [
                'curl', 'timeout', 'timed out', 'time out',
                'connect', 'resolve', 'dns', 'recv', 'send',
                '429', '408', '500', '502', '503', '504', '5xx', 'server', '网关', '超时'
            ];
            return retryable.some(k => msg.includes(k));
        }

        async function retryOne(file, node){
            try {
                if (!file) {
                    alert('无法重试：找不到原文件');
                    return;
                }
                const fd = new FormData();
                fd.append('files[]', file);
                fd.append('category', getSelectedCategory());
                fd.append('format', formatSel.value || 'original');

                // 按钮状态
                const btn = node.querySelector('.danger');
                if (btn) { btn.textContent = '重试中…'; btn.disabled = true; }

                const res = await fetch('upload.php', { method: 'POST', body: fd });
                const data = await res.json().catch(() => null);
                let r = null;
                if (data && typeof data.success === 'boolean') {
                    r = data;
                } else if (data && Array.isArray(data.results) && data.results.length) {
                    r = data.results[0];
                } else {
                    r = { success:false, message: '响应解析失败' };
                }

                // 用新结果替换该节点
                const newNode = buildItemNode(r, 0, [file]);
                node.replaceWith(newNode);

                // 如果成功，刷新分类候选（避免自定义分类刚创建时下拉未更新）
                if (r && r.success) {
                    loadCategories();
                }
            } catch (e) {
                const msg = (e && e.message) ? e.message : '重试失败';
                const meta = node.querySelector('.meta');
                if (meta) meta.textContent = msg;
                const btn = node.querySelector('.danger');
                if (btn) { btn.textContent = '重试'; btn.disabled = false; }
            }
        }

        function copy(text) {
            if (!text) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(()=>{ btnFlash('已复制'); }).catch(()=>fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text){
            const ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); btnFlash('已复制'); } catch {}
            document.body.removeChild(ta);
        }

        function btnFlash(msg){
            const old = btn.textContent; btn.textContent = msg; btn.disabled = true;
            setTimeout(()=>{ btn.textContent = old; btn.disabled = false; }, 600);
        }

    function setBusy(b){ btn.disabled = b; filesInput.disabled = b; categorySelect.disabled = b; categoryCustom.disabled = b; formatSel.disabled = b; }
        function showProgress(p){ bar.style.display = 'block'; barInner.style.width = Math.max(0, Math.min(100, p)) + '%'; }
        function resetProgress(){ bar.style.display = 'none'; barInner.style.width = '0%'; }

        function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;' }[c])); }
        function escapeAttr(s){ return String(s ?? '').replace(/["']/g, c=>({ '"':'&quot;','\'':'&#39;' }[c])); }
    </script>
</body>
</html>
