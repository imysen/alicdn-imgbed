<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片画廊 - 闲鱼图床</title>
  <style>
    :root {
        --text: #1d1d1f;
        --muted: rgba(29, 29, 31, 0.6);
        --bg-gradient: linear-gradient(135deg, #e4ebf5 0%, #f3e5f5 100%);
        --primary: rgba(0, 122, 255, 0.85);
        --glass-bg: rgba(255, 255, 255, 0.25);
        --glass-border: rgba(255, 255, 255, 0.4);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body {
        margin:0; 
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif; 
        background: var(--bg-gradient); 
        min-height: 100vh;
        color: var(--text);
        background-attachment: fixed;
        padding: 40px 5%;
    }
    .container { 
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
    }
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 24px 32px;
        background: var(--glass-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        box-shadow: var(--glass-shadow);
    }
    h1 { font-size: 32px; margin: 0; font-weight: 700; letter-spacing: -0.5px; }
    .header a { 
        font-size: 15px; font-weight: 600; padding: 12px 20px; 
        border-radius: 20px; text-decoration: none; cursor: pointer;
        transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        background: rgba(255,255,255,0.4); color: var(--text); 
        backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
    }
    .header a:hover { background: rgba(255,255,255,0.7); transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
    .muted { color: var(--muted); font-size: 15px; margin: 0; padding-left: 4px; }
    
    .panel {
        background: var(--glass-bg);
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 24px;
        box-shadow: var(--glass-shadow);
    }
    
    .controls { display:flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .controls input[type="text"], .controls select, .controls button { 
        padding: 14px 20px; font-size: 15px; 
        border: 1px solid var(--glass-border); border-radius: 18px; 
        background: rgba(255, 255, 255, 0.3); color: var(--text);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        transition: all 0.3s ease; outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
    }
    .controls input:focus, .controls select:focus {
        background: rgba(255,255,255,0.7); box-shadow: 0 0 0 4px rgba(0,122,255,0.1), inset 0 2px 4px rgba(0,0,0,0.01);
    }
    .controls button { font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.4); }
    .controls button:hover { background: rgba(255,255,255,0.8); transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    .controls .primary { background: var(--primary); color: #fff; border: none; box-shadow: 0 8px 20px rgba(0,122,255,0.2); }
    .controls .primary:hover { background: #007aff; box-shadow: 0 12px 25px rgba(0,122,255,0.3); }
    
    .stats { margin: 16px 0 0; font-size: 15px; font-weight: 500; color: var(--muted); padding-left: 8px; }
    
    .grid { margin-top: 12px; display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }
    .item { 
        border: 1px solid var(--glass-border); 
        border-radius: 24px; overflow: hidden; 
        background: rgba(255,255,255,0.3); 
        display: flex; flex-direction: column; 
        box-shadow: 0 8px 24px rgba(0,0,0,0.02);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .item:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(0,0,0,0.08); background: rgba(255,255,255,0.6); }
    .item img { display:block; width:100%; height:180px; object-fit: cover; background: transparent; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .item:hover img { transform: scale(1.05); }
    .info { padding: 16px; z-index: 2; background: inherit; }
    .name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .meta { font-size: 13px; color: var(--muted); display:flex; justify-content: space-between; }
    .acts { display:flex; gap: 8px; padding: 16px; border-top: 1px solid rgba(255,255,255,0.2); flex-wrap: wrap; z-index: 2; background: inherit; }
    .acts button, .acts a { 
        flex: 1; text-align: center;
        padding: 10px 6px; font-size: 14px; font-weight: 600; 
        background: rgba(255,255,255,0.5); color: var(--text); border: none; border-radius: 14px; 
        cursor:pointer; text-decoration:none; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .acts button:hover, .acts a:hover { background: rgba(0,122,255,0.1); color: #007aff; transform: scale(1.05); }
    .acts .danger { color: #ff3b30; }
    .acts .danger:hover { background: rgba(255,59,48,0.1); color: #ff3b30; }
    .empty, .error, .loading { padding: 60px; text-align: center; color: var(--muted); font-size: 16px; font-weight: 500; grid-column: 1 / -1; }
    
    .cat-row { display:flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
    .cat-row input, .cat-row select { 
        flex: 1; min-width: 150px;
        padding: 14px 20px; font-size: 15px; border: 1px solid var(--glass-border); border-radius: 18px; 
        background: rgba(255,255,255,0.3); outline: none; transition: all 0.3s ease;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .cat-row input:focus, .cat-row select:focus { background: rgba(255,255,255,0.7); box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
    .cat-row button { 
        padding: 14px 24px; font-size: 15px; font-weight: 600; 
        border: none; border-radius: 18px; background: rgba(255,255,255,0.4); cursor:pointer; transition: all 0.3s ease;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
    }
    .cat-row button:hover { background: rgba(255,255,255,0.8); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    .cat-row .danger { color: #ff3b30; background: rgba(255,59,48,0.05); }
    .cat-row .danger:hover { background: rgba(255,59,48,0.15); box-shadow: 0 8px 20px rgba(255,59,48,0.2); }
    @media (max-width: 768px) {
        body { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>图片画廊</h1>
        <p class="muted">查看与管理已上传的图片，可按分类与名称筛选。</p>
      </div>
      <a href="index.html">返回上传</a>
    </div>

    <div class="panel">
      <div class="controls">
        <input id="kw" type="text" placeholder="搜索文件名" style="flex: 2; min-width: 200px;" />
        <select id="selCategory" style="flex: 1; min-width: 150px;"></select>
        <button id="btnRefresh">刷新</button>
        <button id="btnExport">导出数据</button>
        <button id="btnOpenJson" class="primary" title="打开原始数据">打开JSON</button>
      </div>
      <div class="stats" id="stats">统计：总数 0 · 分类 0</div>
    </div>

    <div class="panel" id="catPanel">
      <div class="muted" style="margin-bottom: 8px;">分类管理：可以重命名分类或删除分类（删除分类仅把该分类下图片移至“未分类”）。</div>
      <div class="cat-row">
        <select id="catFrom"></select>
        <input id="catTo" type="text" placeholder="新分类名（用于重命名）" />
        <button id="btnRenameCat">重命名</button>
        <button id="btnDeleteCat" class="danger">删除分类</button>
      </div>
      <div class="cat-row">
        <input id="catNew" type="text" placeholder="新增分类名" style="flex: 3;" />
        <button id="btnAddCat" style="flex: 1;">新增分类</button>
      </div>
    </div>

    <div id="grid" class="grid">
      <div class="loading">正在加载…</div>
    </div>
  </div>

  <script>
    const el = (id)=>document.getElementById(id);
    const grid = el('grid');
    const kw = el('kw');
    const selCategory = el('selCategory');
  const stats = el('stats');
    const btnRefresh = el('btnRefresh');
    const btnExport = el('btnExport');
    const btnOpenJson = el('btnOpenJson');
  const catFrom = el('catFrom');
  const catTo = el('catTo');
  const btnRenameCat = el('btnRenameCat');
  const btnDeleteCat = el('btnDeleteCat');
  const catNew = el('catNew');
  const btnAddCat = el('btnAddCat');

    let all = [];
    let filtered = [];

    window.addEventListener('load', () => {
      load();
      kw.addEventListener('input', applyFilter);
      selCategory.addEventListener('change', applyFilter);
      btnRefresh.addEventListener('click', () => { grid.innerHTML = '<div class="loading">正在刷新…</div>'; load(); });
      btnExport.addEventListener('click', exportData);
      btnOpenJson.addEventListener('click', ()=>{ window.open('gallery.json', '_blank'); });
      btnRenameCat.addEventListener('click', onRenameCategory);
      btnDeleteCat.addEventListener('click', onDeleteCategory);
      btnAddCat.addEventListener('click', onAddCategory);
    });

    async function load(){
      try {
        const res = await fetch('gallery.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('加载失败');
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('数据格式错误');
        all = data;
      await buildCategories();
        applyFilter();
      } catch (e) {
        grid.innerHTML = `<div class="error">${escapeHtml(e.message || '加载出错')}</div>`;
        stats.textContent = '统计：总数 0 · 分类 0';
      }
    }

    async function buildCategories(){
      const prevSel = selCategory.value || '全部';
      const prevFrom = catFrom.value || '';
      try {
        const res = await fetch('categories.php?action=list', { cache: 'no-store' });
        const data = await res.json();
        const catsArr = (data && data.success && Array.isArray(data.data)) ? data.data : ['未分类'];
        const set = new Set(['全部', ...catsArr]);
        selCategory.innerHTML = '';
        for (const c of set){
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c; selCategory.appendChild(opt);
        }
        const cats = Array.from(set).filter(x => x !== '全部');
        catFrom.innerHTML = '';
        for (const c of cats){
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c; catFrom.appendChild(opt);
        }
        // 恢复之前的选择
        if (Array.from(selCategory.options).some(o=>o.value===prevSel)) selCategory.value = prevSel; else selCategory.value = '全部';
        if (prevFrom && Array.from(catFrom.options).some(o=>o.value===prevFrom)) catFrom.value = prevFrom;
      } catch (_) {
        // 兜底
        selCategory.innerHTML = '<option value="全部">全部</option><option value="未分类">未分类</option>';
        catFrom.innerHTML = '<option value="未分类">未分类</option>';
      }
    }

    function applyFilter(){
      const q = (kw.value || '').toLowerCase();
      const cat = selCategory.value || '全部';
      filtered = all.filter(x => {
        const okCat = (cat === '全部') ? true : (x.category === cat);
        const okKw = !q || String(x.fileName || '').toLowerCase().includes(q);
        return okCat && okKw;
      });
      updateStats();
      render();
    }

    function updateStats(){
      const cats = new Set(all.map(x=>x.category).filter(Boolean));
      stats.textContent = `统计：总数 ${all.length} · 分类 ${cats.size}`;
    }

    function render(){
      if (!filtered.length){
        grid.innerHTML = '<div class="empty">暂无图片</div>';
        return;
      }
      const frag = document.createDocumentFragment();
      grid.innerHTML = '';
      for (const item of filtered){
        frag.appendChild(renderItem(item));
      }
      grid.appendChild(frag);
    }

    function renderItem(it){
      const d = document.createElement('div');
      d.className = 'item';
      const url = String(it.url || '');
      const name = String(it.fileName || '图片');
      d.innerHTML = `
        <img src="${escapeAttr(url)}" alt="" loading="lazy" onerror="this.style.display='none'" />
        <div class="info">
          <div class="name" title="${escapeAttr(name)}">${escapeHtml(name)}</div>
          <div class="meta"><span>${escapeHtml(it.category || '未分类')}</span><span>${escapeHtml(it.uploadTime || '')}</span></div>
        </div>
        <div class="acts">
          <button data-url="${escapeAttr(url)}">复制</button>
          <a href="${escapeAttr(url)}" target="_blank" rel="noopener">打开</a>
          <button data-dl="${escapeAttr(url)}" data-name="${escapeAttr(name)}">下载</button>
          <button data-del="${escapeAttr(it.id || '')}" class="danger">删除</button>
        </div>
      `;
      const copyBtn = d.querySelector('button[data-url]');
      const dlBtn = d.querySelector('button[data-dl]');
      const delBtn = d.querySelector('button[data-del]');
      copyBtn.addEventListener('click', ()=>copy(copyBtn.dataset.url));
      dlBtn.addEventListener('click', ()=>download(dlBtn.dataset.dl, dlBtn.dataset.name));
      delBtn.addEventListener('click', ()=>onDeleteItem(delBtn.dataset.del));
      return d;
    }

    async function onDeleteItem(id){
      if (!id) return;
      if (!confirm('确认从画廊中删除该图片记录吗？此操作不会删除远端图片。')) return;
      try {
        const res = await fetch('manage.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'delete', id })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '删除失败');
        // 本地数据同步并刷新
        all = all.filter(x => x.id !== id);
        applyFilter();
      } catch (e) {
        alert(e.message || '删除失败');
      }
    }

    async function onRenameCategory(){
      const from = catFrom.value || '';
      const to = (catTo.value || '').trim();
      if (!from || !to) { alert('请选择原分类并填写新分类名'); return; }
      if (from === to) { alert('新旧分类相同，无需重命名'); return; }
      if (from === '未分类') { alert('“未分类”不可重命名'); return; }
      try {
        const res = await fetch('manage.php', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'renameCategory', from, to })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '重命名失败');
        // 刷新本地数据
        all.forEach(x => { if (x.category === from) x.category = to; });
        buildCategories(all);
        // 同步更新分类表并确认结果
        try {
          const r2 = await fetch('categories.php?action=rename', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ from, to }) });
          const j2 = await r2.json();
          if (!j2.success) throw new Error(j2.message || '分类表重命名失败');
          const arr = Array.isArray(j2.data) ? j2.data.map(String) : [];
          if (!arr.includes(String(to)) || arr.includes(String(from))) {
            throw new Error('分类表未更新，请重试');
          }
        } catch (e) { alert(e.message || '分类表重命名失败'); }
        await buildCategories();
        applyFilter();
        catTo.value = '';
        alert('已重命名');
      } catch (e) { alert(e.message || '重命名失败'); }
    }

    async function onDeleteCategory(){
      const name = catFrom.value || '';
      if (!name) { alert('请选择要删除的分类'); return; }
      if (name === '未分类') { alert('“未分类”不可删除'); return; }
      if (!confirm(`确认删除分类 “${name}” 吗？该分类下图片将移动到“未分类”。`)) return;
      try {
        const res = await fetch('manage.php', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'deleteCategory', name, replacement: '未分类' })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '删除分类失败');
        // 刷新本地数据
        all.forEach(x => { if (x.category === name) x.category = '未分类'; });
        buildCategories(all);
          // 同步从分类表移除并确认结果
          try {
            const r2 = await fetch('categories.php?action=remove', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name }) });
            const j2 = await r2.json();
            if (!j2.success) throw new Error(j2.message || '分类表删除失败');
            const arr = Array.isArray(j2.data) ? j2.data.map(String) : [];
            if (arr.includes(String(name))) {
              throw new Error('分类表未删除该分类');
            }
          } catch (e) { alert(e.message || '分类表删除失败'); }
          await buildCategories();
        applyFilter();
        alert('已删除分类');
      } catch (e) { alert(e.message || '删除分类失败'); }
    }

    async function onAddCategory(){
      const name = (catNew.value || '').trim();
      if (!name) { alert('请输入分类名'); return; }
      if (name === '未分类') { alert('“未分类”已存在'); return; }
      try {
        const res = await fetch('categories.php?action=add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '添加失败');
        await buildCategories();
        // 便于后续操作，选择到新分类
        const opts = Array.from(selCategory.options).map(o=>o.value);
        if (opts.includes(name)) selCategory.value = name;
        const optsFrom = Array.from(catFrom.options).map(o=>o.value);
        if (optsFrom.includes(name)) catFrom.value = name;
        catNew.value = '';
        applyFilter();
        alert('已添加分类');
      } catch (e) {
        alert((e && e.message) ? e.message : '添加失败');
      }
    }

    function copy(text){
      if (!text) return;
      if (navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(()=>{}).catch(()=>fallbackCopy(text));
      } else { fallbackCopy(text); }
    }
    function fallbackCopy(text){
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch {}
      document.body.removeChild(ta);
    }
    function download(url, name){
      if (!url) return;
      const a = document.createElement('a');
      a.href = url; a.download = name || 'image'; a.target = '_blank';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    function exportData(){
      const dataStr = JSON.stringify(all, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'gallery_export_' + new Date().toISOString().slice(0,10) + '.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;' }[c])); }
    function escapeAttr(s){ return String(s ?? '').replace(/["']/g, c=>({ '"':'&quot;','\'':'&#39;' }[c])); }
  </script>
</body>
</html>
